name: Hassfest Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restructure for hassfest (content_in_root)
        run: |
          # hassfest expects custom_components/<domain>/ structure
          tmp=$(mktemp -d)
          shopt -s dotglob
          mv $GITHUB_WORKSPACE/* "$tmp/" 2>/dev/null || true
          shopt -u dotglob
          mkdir -p $GITHUB_WORKSPACE/custom_components/yeelight_cube
          shopt -s dotglob
          mv "$tmp"/* $GITHUB_WORKSPACE/custom_components/yeelight_cube/ 2>/dev/null || true
          shopt -u dotglob

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
